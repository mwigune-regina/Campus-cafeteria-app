name: cafeteria_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  google_fonts: ^8.1.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# Launcher icon (the restaurant glyph from the landing page).
# Regenerate after editing assets/icon/* with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1A2B6B"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true
